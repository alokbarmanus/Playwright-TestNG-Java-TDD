name: CI - OrangeHRM Playwright Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  # Manual trigger: choose environment and suite type.
  # On push / pull_request: environment=dev, suite=sequential.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'dev'
        type: choice
        options: [ dev, sit, uat ]
      suite_type:
        description: 'Test suite type'
        required: true
        default: 'sequential'
        type: choice
        options: [ sequential, parallel, crossbrowser ]

# ─────────────────────────────────────────────────────────────────────────────
# Global env vars
# ─────────────────────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '25'

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build ────────────────────────────────────────────────────────────
  # Compiles all sources and acts as a gate before the test job starts.
  # If compilation fails the test job is skipped immediately.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (compile sources)
        run: mvn clean test-compile -q

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  # On push / pull_request  →  DEV environment, sequential suite.
  # On workflow_dispatch    →  environment + suite type from the dropdowns.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests - ${{ github.event.inputs.environment || 'dev' }} (${{ github.event.inputs.suite_type || 'sequential' }})
    runs-on: ubuntu-latest
    needs: build

    steps:

      # ── 1. Resolve target environment and suite type ──────────────────────
      # Push / PR → dev + sequential.  Manual dispatch → chosen values.
      - name: Set target environment and suite
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          SUITE="${{ github.event.inputs.suite_type || 'sequential' }}"

          # Map suite_type to the correct testng XML filename suffix
          if [ "$SUITE" = "sequential" ]; then
            SUITE_FILE="testngRunner/testng-${ENV}.xml"
          elif [ "$SUITE" = "parallel" ]; then
            SUITE_FILE="testngRunner/testng-${ENV}-parallel.xml"
          else
            SUITE_FILE="testngRunner/testng-${ENV}-crossbrowser.xml"
          fi

          echo "TARGET_ENV=$ENV"         >> $GITHUB_ENV
          echo "TARGET_SUITE=$SUITE"     >> $GITHUB_ENV
          echo "TARGET_SUITE_FILE=$SUITE_FILE" >> $GITHUB_ENV
          echo "Environment: $ENV | Suite: $SUITE | File: $SUITE_FILE"

      # ── 2. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 3. JDK ───────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # ── 4. Build ─────────────────────────────────────────────────────────
      - name: Build (compile sources)
        run: mvn clean test-compile -q

      # ── 5. Playwright browsers ───────────────────────────────────────────
      # Downloads Chromium, Firefox, and WebKit engines plus their OS-level
      # system dependencies so all three browsers are available for tests.
      - name: Install Playwright browsers
        run: |
          mvn exec:java \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps" \
            -Dexec.classpathScope=test

      # ── 6. Run tests ─────────────────────────────────────────────────────
      # -Dheadless=true            : CI always runs headless (local default is headed).
      # -Dplaywright.wait.timeout  : 60 s — CI networks are slower than local machines.
      # -Dsurefire.rerunFailingTestsCount=2 : retry each failed test up to 2 times
      #                              to tolerate transient demo-site flakiness.
      - name: Run tests (${{ env.TARGET_ENV }} / ${{ env.TARGET_SUITE }})
        run: |
          mvn test \
            -Denv=${{ env.TARGET_ENV }} \
            -DsuiteFile=${{ env.TARGET_SUITE_FILE }} \
            -Dheadless=true \
            -Dplaywright.wait.timeout=60000 \
            -Dsurefire.rerunFailingTestsCount=2

      # ── 7. Upload ExtentReports ──────────────────────────────────────────
      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: extent-reports-${{ env.TARGET_ENV }}-${{ env.TARGET_SUITE }}
          path: target/extent-reports/
          retention-days: 30

      # ── 8. Upload Surefire reports ───────────────────────────────────────
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-${{ env.TARGET_ENV }}-${{ env.TARGET_SUITE }}
          path: target/surefire-reports/
          retention-days: 30

