name: CI - OrangeHRM Playwright Tests

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  # Allow manual runs from the Actions UI with an optional env override
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to run tests against'
        required: true
        default: 'dev'
        type: choice
        options: [ dev, sit, uat ]

# ─────────────────────────────────────────────────────────────────────────────
# Global env vars
# ─────────────────────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '25'
  # Opt into Node.js 24 now to suppress the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Jobs
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Build ────────────────────────────────────────────────────────────
  # Compiles all sources and acts as a gate before the test matrix starts.
  # If compilation fails every test job is skipped immediately.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (compile sources)
        run: mvn clean test-compile -q

  # ── Job 2: Test (matrix: dev / sit / uat) ───────────────────────────────────
  # Runs the full test suite for each environment in parallel.
  # Depends on the Build job — only starts when compilation succeeds.
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests - ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: build

    strategy:
      # Let all environments finish even if one fails
      fail-fast: false
      matrix:
        env: [ dev, sit, uat ]

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────────────
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Build ─────────────────────────────────────────────────────────
      - name: Build (compile sources)
        run: mvn clean test-compile -q

      # ── 4. Playwright browsers ───────────────────────────────────────────
      # Downloads Chromium, Firefox, and WebKit engines plus their OS-level
      # system dependencies so all three browsers are available for tests.
      - name: Install Playwright browsers
        run: |
          mvn exec:java \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps" \
            -Dexec.classpathScope=test

      # ── 5. Run tests ─────────────────────────────────────────────────────
      # -Dheadless=true            : overrides application.properties — CI must run headless.
      # -Dplaywright.wait.timeout  : 60 s — CI networks are slower than local machines.
      # -Dsurefire.rerunFailingTestsCount=2 : retry each failed test up to 2 times
      #                              to tolerate transient demo-site flakiness.
      - name: Run tests (${{ matrix.env }})
        run: |
          mvn test \
            -Denv=${{ matrix.env }} \
            -Dheadless=true \
            -Dplaywright.wait.timeout=60000 \
            -Dsurefire.rerunFailingTestsCount=2

      # ── 6. Upload ExtentReports ──────────────────────────────────────────
      - name: Upload Extent Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-reports-${{ matrix.env }}
          path: target/extent-reports/
          retention-days: 30

      # ── 7. Upload Surefire reports ───────────────────────────────────────
      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.env }}
          path: target/surefire-reports/
          retention-days: 30

