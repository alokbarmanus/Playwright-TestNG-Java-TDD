# Application base URL
env.baseurl=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# SSMS (SQL Server) database connection
db.url=jdbc:sqlserver://uat-db-server:1433;databaseName=OrangeHRM_UAT;encrypt=true;trustServerCertificate=true
db.username=uat_user
db.password=uat_password
