# ============================================================
# application.properties
# Common, environment-agnostic configuration shared by all
# environments.  Environment-specific values (URL, DB, etc.)
# belong in the corresponding <env>.properties file.
# ============================================================

# Default environment - used when the JVM system property
# -Denv=<name> is not provided at runtime.
default.env=dev

# Browser to launch: chromium | firefox | webkit
browser.name=chromium

# Run browser in headless mode: true | false
headless=false

# Proxy settings
system.http.proxyHost=proxy.xyz.com
system.http.proxyPort=8080

# ==============Playwright Properties==========================
playwright.wait.timeout=30000
playwright.init.retry.timeout=10000

test.success.screenshots=0
test.failure.screenshots=1

retry.count=1
